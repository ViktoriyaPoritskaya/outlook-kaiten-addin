<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Kaiten Add-in commands</title>

    <!-- Полифилы Promise и fetch для IE11 (движок Outlook 2016). До office.js.
         Лежат локально в vendor/. -->
    <script type="text/javascript" src="vendor/promise-polyfill.min.js"></script>
    <script type="text/javascript" src="vendor/fetch.umd.js"></script>
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!--
      Наши скрипты грузим динамически с меткой версии (?v=timestamp), чтобы движок IE
      (у него отдельный кэш INetCache, который очистка Wef не трогает) НЕ подсовывал
      старые версии. document.write сохраняет порядок загрузки в IE11.
    -->
    <script type="text/javascript">
      (function () {
        var v = new Date().getTime();
        var files = ["config.js", "settings.js", "kaiten-api.js", "commands.js"];
        for (var i = 0; i < files.length; i++) {
          document.write(
            '<script type="text/javascript" src="' + files[i] + "?v=" + v + '"><\/script>'
          );
        }
      })();
    </script>
  </head>
  <body>
    <!--
      Невидимая страница: Outlook грузит её для регистрации функции createKaitenCard.
      ExecuteFunction-команды не имеют UI — клик по кнопке сразу вызывает обработчик.
    -->
  </body>
</html>
